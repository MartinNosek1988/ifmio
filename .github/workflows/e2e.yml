name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: e2e
          POSTGRES_PASSWORD: e2e_password
          POSTGRES_DB: ifmio_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U e2e"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://e2e:e2e_password@localhost:5432/ifmio_e2e
      DIRECT_URL: postgresql://e2e:e2e_password@localhost:5432/ifmio_e2e
      JWT_SECRET: e2e-test-jwt-secret-not-for-production-use-min-32chars
      JWT_REFRESH_SECRET: e2e-test-refresh-secret-not-for-production-use-32ch
      NODE_ENV: test
      E2E_SEED_ENABLED: 'true'
      PORT: 3000
      CORS_ORIGIN: http://localhost:5173
      SENTRY_DSN: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: apps/api

      - name: Apply migrations
        run: npx prisma migrate deploy
        working-directory: apps/api

      - name: Build API
        run: npm run build
        working-directory: apps/api

      - name: Build Web
        run: npm run build
        working-directory: apps/web

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: apps/e2e

      # Start servers in background
      - name: Start API server
        run: |
          cd apps/api
          node dist/apps/api/src/main.js > /tmp/api.log 2>&1 &
          echo $! > /tmp/api.pid

      - name: Start Web server
        run: |
          cd apps/web
          npx vite preview --port 5173 > /tmp/web.log 2>&1 &
          echo $! > /tmp/web.pid

      - name: Wait for API
        run: |
          echo "Waiting for API on :3000..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/v1/health > /dev/null 2>&1; then
              echo "API ready (attempt $i)"
              exit 0
            fi
            sleep 2
          done
          echo "=== API FAILED TO START ==="
          cat /tmp/api.log || true
          exit 1

      - name: Wait for Web
        run: |
          echo "Waiting for Web on :5173..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:5173 > /dev/null 2>&1; then
              echo "Web ready (attempt $i)"
              exit 0
            fi
            sleep 2
          done
          echo "=== WEB FAILED TO START ==="
          cat /tmp/web.log || true
          exit 1

      # Seed creates a test user — capture the email for login
      - name: Seed E2E test data
        run: |
          SEED=$(curl -sf -X POST http://localhost:3000/api/v1/e2e-seed/setup)
          echo "Seed: $SEED"
          echo "E2E_TENANT_ID=$(echo $SEED | jq -r .tenantId)" >> $GITHUB_ENV
          echo "E2E_USER_EMAIL=$(echo $SEED | jq -r .userEmail)" >> $GITHUB_ENV

      - name: Run E2E tests
        run: npx playwright test
        working-directory: apps/e2e
        env:
          BASE_URL: http://localhost:5173
          TEST_EMAIL: ${{ env.E2E_USER_EMAIL }}
          TEST_PASSWORD: E2eTestPass123!

      # Cleanup
      - name: Cleanup E2E data
        if: always()
        run: |
          if [ -n "$E2E_TENANT_ID" ]; then
            curl -s -X DELETE "http://localhost:3000/api/v1/e2e-seed/cleanup/$E2E_TENANT_ID" || true
          fi

      - name: Show API logs on failure
        if: failure()
        run: cat /tmp/api.log 2>/dev/null || true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/e2e/playwright-report/
          retention-days: 7

      - name: Upload failure screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-screenshots
          path: apps/e2e/test-results/
          retention-days: 7
