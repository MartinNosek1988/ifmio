name: Deploy to Production
on:
  push:
    branches: [main]
concurrency:
  group: deploy-production
  cancel-in-progress: false
jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd apps/api
          npm install

      - name: Run Prisma migrations
        run: |
          cd apps/api
          npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_DATABASE_URL }}

  deploy:
    runs-on: ubuntu-latest
    needs: migrate
    timeout-minutes: 15
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 10m
          script: |
            set -e
            cd /opt/ifmio
            echo "Pull latest code"
            git fetch origin main
            git reset --hard origin/main
            echo "Build and restart"
            docker compose -f docker-compose.prod.yml build --no-cache
            docker compose -f docker-compose.prod.yml up -d
            echo "Wait for API health"
            sleep 20
            if docker exec ifmio-api-1 node -e "require('http').get('http://localhost:3000/api/v1/health', r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"; then
              echo "API healthy"
            else
              echo "API health check failed"
              docker compose -f docker-compose.prod.yml logs api --tail 30
              exit 1
            fi
            echo "Cleanup old images"
            docker image prune -f
            echo "Deploy done"