name: Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 10m
          script: |
            set -e
            cd /opt/ifmio

            echo "đź“Ą Pull latest code"
            git fetch origin main
            git reset --hard origin/main

            echo "đź”¨ Build & restart"
            docker compose -f docker-compose.prod.yml build --no-cache
            docker compose -f docker-compose.prod.yml up -d

            echo "âŹł Wait for API health"
            for i in $(seq 1 60); do
              if curl -sf http://localhost:3000/api/v1/health -o /dev/null > /dev/null 2>&1; then
                echo "âś… API healthy"
                break
              fi
              if [ $i -eq 60 ]; then
                echo "âťŚ API health check failed"
                docker compose -f docker-compose.prod.yml logs api --tail 30
                exit 1
              fi
              sleep 3
            done

            echo "đź§ą Cleanup old images"
            docker image prune -f

            echo "âś… Deploy dokonÄŤen â€” $(date)"
