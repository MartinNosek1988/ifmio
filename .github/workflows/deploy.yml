name: Deploy to Production

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/martinnosek1988/ifmio/api
  WEB_IMAGE: ghcr.io/martinnosek1988/ifmio/web

jobs:
  migrate:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout tested commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts && cd apps/api && npx prisma generate

      - name: Run Prisma migrations
        run: cd apps/api && npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_DATABASE_URL }}

  build-and-push:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout tested commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  deploy:
    needs: [migrate, build-and-push]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 15m
          script: |
            set -e
            cd /opt/ifmio

            echo "Login to GHCR"
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u martinnosek1988 --password-stdin

            echo "Pull latest images"
            docker compose -f docker-compose.prod.yml pull api web

            echo "Restart services"
            docker compose -f docker-compose.prod.yml up -d

            echo "Wait for API startup (30s initial)..."
            sleep 30

            echo "Check API health (5 attempts, 10s apart)..."
            for i in 1 2 3 4 5; do
              if docker exec ifmio-api-1 node -e "require('http').get('http://localhost:3000/api/v1/health', r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))" 2>/dev/null; then
                echo "API healthy on attempt $i"
                break
              fi
              echo "Attempt $i failed, waiting 10s..."
              if [ "$i" = "5" ]; then
                echo "=== API FAILED — CONTAINER LOGS ==="
                docker compose -f docker-compose.prod.yml logs api --tail 80
                echo "=== CONTAINER STATUS ==="
                docker ps -a --filter name=ifmio
                exit 1
              fi
              sleep 10
            done

            echo "Cleanup old images"
            docker image prune -f
            echo "Deploy done"
