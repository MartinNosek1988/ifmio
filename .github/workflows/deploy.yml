name: Deploy to Production

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Only deploy if CI passed on a push to main
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    steps:
      - name: Checkout tested commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Prisma migrations
        run: npx prisma migrate deploy
        working-directory: apps/api
        env:
          DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_DATABASE_URL }}

  deploy:
    runs-on: ubuntu-latest
    needs: migrate
    timeout-minutes: 15
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 15m
          script: |
            set -e
            cd /opt/ifmio

            # Fix .git ownership — Docker creates root-owned objects
            sudo chown -R $(id -u):$(id -g) .git
            git config --global --add safe.directory /opt/ifmio
            git config gc.auto 0

            echo "Pull latest code"
            git fetch origin main
            git checkout main
            git reset --hard origin/main

            echo "Build and restart"
            docker compose -f docker-compose.prod.yml build --no-cache
            docker compose -f docker-compose.prod.yml up -d

            echo "Wait for API startup (30s initial)..."
            sleep 30

            echo "Check API health (5 attempts, 10s apart)..."
            for i in 1 2 3 4 5; do
              if docker exec ifmio-api-1 node -e "require('http').get('http://localhost:3000/api/v1/health', r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))" 2>/dev/null; then
                echo "API healthy on attempt $i"
                break
              fi
              echo "Attempt $i failed, waiting 10s..."
              if [ "$i" = "5" ]; then
                echo "=== API FAILED — CONTAINER LOGS ==="
                docker compose -f docker-compose.prod.yml logs api --tail 80
                echo "=== CONTAINER STATUS ==="
                docker ps -a --filter name=ifmio
                echo "=== CONTAINER INSPECT ==="
                docker inspect ifmio-api-1 --format='{{.State.Status}} {{.State.Health.Status}} {{.State.ExitCode}}' 2>/dev/null || echo "Container not found"
                exit 1
              fi
              sleep 10
            done

            echo "Cleanup old images"
            docker image prune -f
            echo "Deploy done"
