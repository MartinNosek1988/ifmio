name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ifmio_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Typecheck ──────────────────────────────────────
      - name: Typecheck API
        run: npm run type-check
        working-directory: apps/api

      - name: Typecheck Web
        run: npx tsc --noEmit --project tsconfig.app.json
        working-directory: apps/web

      # ── Build ──────────────────────────────────────────
      - name: Build API
        run: npm run build
        working-directory: apps/api

      - name: Build Web
        run: npm run build
        working-directory: apps/web

      # ── Database setup ─────────────────────────────────
      - name: Apply Prisma migrations
        run: npx prisma migrate deploy
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/ifmio_test
          DIRECT_URL: postgresql://test:test@localhost:5432/ifmio_test

      # ── Test ───────────────────────────────────────────
      - name: Test API
        run: npx jest --runInBand --forceExit
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/ifmio_test
          DIRECT_URL: postgresql://test:test@localhost:5432/ifmio_test
          JWT_SECRET: ci-test-jwt-secret-not-for-production-use-min-32chars
          JWT_REFRESH_SECRET: ci-test-refresh-secret-not-for-production-use-32ch
          NODE_ENV: test
