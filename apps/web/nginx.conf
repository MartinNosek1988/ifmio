server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── 301 Redirects ──────────────────────────────────────────

    # Root → default locale
    location = / {
        return 301 /en/;
    }

    # Legacy non-prefixed URLs → locale-prefixed
    location = /cenik  { return 301 /cs/cenik; }
    location = /cenik/ { return 301 /cs/cenik; }
    location = /demo   { return 301 /cs/demo; }
    location = /demo/  { return 301 /cs/demo; }
    location = /kontakt  { return 301 /cs/kontakt; }
    location = /kontakt/ { return 301 /cs/kontakt; }
    location = /pricing  { return 301 /en/pricing; }
    location = /pricing/ { return 301 /en/pricing; }
    location = /contact  { return 301 /en/contact; }
    location = /contact/ { return 301 /en/contact; }

    # ── SEO static files ───────────────────────────────────────

    location = /robots.txt {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    location = /sitemap.xml {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=3600";
        access_log off;
    }

    # ── Security ───────────────────────────────────────────────

    # Allow .well-known (security.txt, acme-challenge, etc.)
    location /.well-known/ {
        try_files $uri =404;
    }

    # Block dotfiles (but not .well-known which is handled above)
    location ~ /\.(env|git|docker|htaccess|htpasswd|npmrc|DS_Store) {
        return 404;
    }

    # ── Cache control ──────────────────────────────────────────

    # SPA index — always fresh (prevents stale chunk 404 after deploy)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # ── SPA fallback ───────────────────────────────────────────

    # SPA fallback — no $uri/ to prevent directory redirect on /assets
    location / {
        try_files $uri /index.html;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

        # CSP enforced
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; connect-src 'self' https://*.ingest.sentry.io; font-src 'self' data: https://fonts.gstatic.com; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    }

    # .mjs worker files (pdf.js) — must be before .js location
    location ~* ^/assets/.+\.mjs$ {
        default_type application/javascript;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Static assets (JS/CSS/fonts/images with content hashes)
    # Regex avoids catching the SPA /assets route (Pasportizace page)
    location ~* ^/assets/.+\.(js|css|woff2?|ttf|eot|svg|png|jpg|gif|ico|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Disable server version exposure
    server_tokens off;
}
