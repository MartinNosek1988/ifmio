version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    environment:
      # Databáze — Supabase nebo lokální PG
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      DIRECT_URL: ${DIRECT_URL:-${DATABASE_URL}}
      # Auth
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-${JWT_SECRET}}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      # App
      PORT: 3000
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-https://${DOMAIN:-localhost}}
      # Email
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@ifmio.cz}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-ifmio}
      # Super admin
      SUPER_ADMIN_EMAILS: ${SUPER_ADMIN_EMAILS:-}
      # Mio AI
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # ČÚZK Katastr API
      CUZK_API_KEY: ${CUZK_API_KEY:-}
    expose:
      - '3000'
    healthcheck:
      test: ['CMD', 'node', '-e', 'require("http").get("http://localhost:3000/api/v1/health", r => process.exit(r.statusCode === 200 ? 0 : 1)).on("error", () => process.exit(1))']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    security_opt:
      - no-new-privileges:true
    depends_on:
      api:
        condition: service_healthy
    expose:
      - '80'

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp'
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      CADDY_EMAIL: ${CADDY_EMAIL:-admin@yourdomain.cz}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    depends_on:
      - web
      - api

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on:
      - web
      - api

volumes:
  caddy_data:
  caddy_config:
  caddy_logs:
