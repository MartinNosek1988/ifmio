version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ifmio-db
    environment:
      POSTGRES_USER: ifmio
      POSTGRES_PASSWORD: ifmio_pass
      POSTGRES_DB: ifmio_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ifmio -d ifmio_dev']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ifmio-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
