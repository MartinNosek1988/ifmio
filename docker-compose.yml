version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ifmio-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ifmio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ifmio_pass}
      POSTGRES_DB: ${POSTGRES_DB:-ifmio_dev}
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-ifmio} -d ${POSTGRES_DB:-ifmio_dev}']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ifmio-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-ifmio_redis_dev}
    ports:
      - '127.0.0.1:6379:6379'
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-ifmio_redis_dev}', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
